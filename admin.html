<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Zawa & Rayyan's Wedding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        :root {
            --gold: #B8942A;
            --gold-pale: #F5EDD5;
            --bg: #FAF8F3;
            --bg2: #F2EDE0;
            --border: rgba(139, 105, 20, 0.15);
            --border-strong: rgba(139, 105, 20, 0.28);
            --text: #1A1710;
            --text2: #5C5444;
            --text3: #9A8F7E;
            --shadow: rgba(90, 70, 20, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── AUTH GATE ─────────────────────────────────────── */
        #auth-gate {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f5f0e3 0%, #ede6d0 100%);
        }

        .auth-card {
            background: #fff;
            border: 1px solid var(--border-strong);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            width: 340px;
            box-shadow: 0 8px 40px var(--shadow);
        }

        .auth-logo {
            font-size: 52px;
            margin-bottom: 16px;
        }

        .auth-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 6px;
        }

        .auth-sub {
            font-size: 13px;
            color: var(--text3);
            margin-bottom: 28px;
        }

        .auth-input {
            width: 100%;
            border: 1.5px solid var(--border-strong);
            border-radius: 10px;
            padding: 13px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            margin-bottom: 14px;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(184, 148, 42, 0.12);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #B8942A, #D4A83A);
            color: #fff;
            border: none;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
            box-shadow: 0 4px 20px rgba(184, 148, 42, 0.35);
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .auth-error {
            color: #C0392B;
            font-size: 13px;
            margin-top: 10px;
        }

        /* ── APP SHELL ─────────────────────────────────────── */
        #app {
            display: none;
        }

        .topbar {
            background: rgba(250, 248, 243, 0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            align-items: center;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px var(--shadow);
            gap: 16px;
        }

        .topbar-logo {
            height: 26px;
            object-fit: contain;
        }

        .topbar-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-style: italic;
            color: var(--gold);
            flex: 1;
        }

        .topbar-badge {
            background: rgba(184, 148, 42, 0.12);
            border: 1px solid rgba(184, 148, 42, 0.35);
            color: var(--gold);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 100px;
            text-transform: uppercase;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        /* ── STATS CARDS ───────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .stat-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text3);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text3);
            margin-top: 4px;
        }

        /* ── SECTION HEADERS ───────────────────────────────── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            font-weight: 400;
            color: var(--text);
        }

        .section-count {
            background: var(--gold-pale);
            color: var(--gold);
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 100px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 40px 0;
        }

        /* ── GUESTS TABLE ──────────────────────────────────── */
        .guests-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .guests-table th {
            background: var(--bg2);
            padding: 12px 20px;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text3);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .guests-table td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text);
            vertical-align: middle;
        }

        .guests-table tr:last-child td {
            border-bottom: none;
        }

        .guests-table tr:hover td {
            background: var(--bg2);
        }

        .guest-avatar {
            font-size: 22px;
            margin-right: 8px;
        }

        .event-chip {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            margin: 2px;
        }

        .event-chip.retro {
            background: #FFF3CD;
            color: #856404;
        }

        .event-chip.mehendi {
            background: #D1F2D1;
            color: #1E6E1E;
        }

        .event-chip.nikah {
            background: #FFDDE1;
            color: #B02A37;
        }

        /* ── PHOTO GRID ────────────────────────────────────── */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .filter-chip {
            padding: 7px 16px;
            border: 1.5px solid var(--border-strong);
            border-radius: 100px;
            background: #fff;
            color: var(--text2);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:hover,
        .filter-chip.active {
            background: var(--gold-pale);
            border-color: var(--gold);
            color: var(--gold);
            font-weight: 600;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .admin-card {
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg2);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .admin-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .admin-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }

        .admin-card-info {
            padding: 10px 12px 12px;
        }

        .admin-card-guest {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }

        .admin-card-meta {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .admin-card-time {
            font-size: 11px;
            color: var(--text3);
        }

        .admin-dl-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .admin-card:hover .admin-dl-btn {
            opacity: 1;
        }

        /* ── LIGHTBOX ──────────────────────────────────────── */
        .lb {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 8, 4, 0.92);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .lb.open {
            display: flex;
        }

        .lb-inner {
            max-width: 90vw;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .lb-inner img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lb-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.12);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            font-size: 20px;
        }

        .lb-meta {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            text-align: center;
        }

        .lb-meta span {
            color: rgba(212, 168, 58, 0.9);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── EMPTY / LOADING ───────────────────────────────── */
        .empty {
            padding: 48px;
            text-align: center;
            color: var(--text3);
            font-size: 14px;
        }

        .loading-ring {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── RESPONSIVE ────────────────────────────────────── */
        @media (max-width: 600px) {
            .topbar {
                padding: 0 16px;
            }

            .main {
                padding: 20px 12px 48px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <!-- ── AUTH GATE ─────────────────────────────────────────── -->
    <div id="auth-gate">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="assets/zr_logo.svg" alt="ZR" style="height:72px;object-fit:contain;" />
            </div>
            <h1 class="auth-title">Admin Panel</h1>
            <p class="auth-sub">Zawa &amp; Rayyan's Wedding</p>
            <input type="password" id="pw-input" class="auth-input" placeholder="Enter admin password"
                onkeydown="if(event.key==='Enter') checkPassword()" />
            <button class="auth-btn" onclick="checkPassword()">Enter</button>
            <div class="auth-error hidden" id="auth-error">Incorrect password</div>
        </div>
    </div>

    <!-- ── MAIN APP ───────────────────────────────────────────── -->
    <div id="app">
        <div class="topbar">
            <img src="assets/zr_text.svg" alt="ZR" class="topbar-logo" />
            <div class="topbar-title">Admin Panel</div>
            <div class="topbar-badge">Admin</div>
        </div>

        <div class="main">

            <!-- Stats -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Photos</div>
                    <div class="stat-value" id="stat-photos">—</div>
                    <div class="stat-sub">across all events</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Guests</div>
                    <div class="stat-value" id="stat-guests">—</div>
                    <div class="stat-sub">have uploaded</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Retro</div>
                    <div class="stat-value" id="stat-retro">—</div>
                    <div class="stat-sub">photos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Mehendi</div>
                    <div class="stat-value" id="stat-mehendi">—</div>
                    <div class="stat-sub">photos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Nikah</div>
                    <div class="stat-value" id="stat-nikah">—</div>
                    <div class="stat-sub">photos</div>
                </div>
            </div>

            <!-- Guests -->
            <div class="section-header">
                <h2 class="section-title">Guests</h2>
                <span class="section-count" id="guest-count">…</span>
            </div>

            <div id="guests-wrap">
                <div class="loading-ring"></div>
            </div>

            <div class="divider"></div>

            <!-- Photos -->
            <div class="section-header">
                <h2 class="section-title">All Photos</h2>
                <span class="section-count" id="photo-count">…</span>
            </div>

            <div class="filter-bar" id="photo-filters">
                <button class="filter-chip active" data-event="all" onclick="filterPhotos(this)">All</button>
                <button class="filter-chip" data-event="retro" onclick="filterPhotos(this)">Retro</button>
                <button class="filter-chip" data-event="mehendi" onclick="filterPhotos(this)">Mehendi</button>
                <button class="filter-chip" data-event="nikah" onclick="filterPhotos(this)">Nikah</button>
            </div>

            <div id="photos-wrap">
                <div class="loading-ring"></div>
            </div>
        </div>
    </div>

    <!-- ── LIGHTBOX ───────────────────────────────────────────── -->
    <div class="lb" id="lb" onclick="closeLb()">
        <button class="lb-close" onclick="closeLb()">✕</button>
        <div class="lb-inner" onclick="event.stopPropagation()">
            <img id="lb-img" src="" alt="" />
            <div class="lb-meta">
                <div id="lb-guest"></div>
                <span id="lb-event"></span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-storage-compat.js"></script>

    <script>
        /* ── PASTE YOUR FIREBASE CONFIG HERE (same as app.js) ── */
        const FIREBASE_CONFIG = {
    apiKey:            'AIzaSyDsvtADJaJVYGDBfcgraLGfTjWfoFRtIJA',
    authDomain:        'zawa-rayyan-wedding.firebaseapp.com',
    projectId:         'zawa-rayyan-wedding',
    storageBucket:     'zawa-rayyan-wedding.firebasestorage.app',
    messagingSenderId: '513049560495',
    appId:             '1:513049560495:web:4363a43778e649b6ee1b5a',
    measurementId:     'G-S1YRG6WZHR',
  };

        // ── Change this password ──────────────────────────────────
        const ADMIN_PASSWORD = 'zr2026';

        // ─────────────────────────────────────────────────────────
        const EVENT_LABELS = { retro: 'Retro', mehendi: 'Mehendi', nikah: 'Nikah' };

        let db = null;
        let allPhotos = [];
        let allUsers = [];
        let activeFilter = 'all';

        /* ── AUTH GATE ─────────────────────────────────────────── */
        function checkPassword() {
            const pw = document.getElementById('pw-input').value;
            if (pw === ADMIN_PASSWORD) {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('auth-error').classList.add('hidden');
                initAdmin();
            } else {
                document.getElementById('auth-error').classList.remove('hidden');
                document.getElementById('pw-input').value = '';
                document.getElementById('pw-input').focus();
            }
        }

        /* ── INIT ──────────────────────────────────────────────── */
        function initAdmin() {
            try {
                firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.firestore();

                // Anonymous auth so Firestore rules work
                firebase.auth().signInAnonymously().then(() => {
                    loadData();
                }).catch(err => {
                    console.error('Admin auth error:', err);
                    alert('Firebase auth failed. Check your config.');
                });
            } catch (err) {
                console.error('Firebase init failed:', err);
                alert('Firebase initialisation failed. Check the config at the top of admin.html.');
            }
        }

        /* ── LOAD DATA ─────────────────────────────────────────── */
        function loadData() {
            // Real-time listeners for both collections
            db.collection('users').onSnapshot(snap => {
                allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
                renderGuests();
            });

            db.collection('photos').orderBy('ts', 'desc').onSnapshot(snap => {
                allPhotos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderStats();
                renderPhotos();
            });
        }

        /* ── STATS ─────────────────────────────────────────────── */
        function renderStats() {
            document.getElementById('stat-photos').textContent = allPhotos.length;
            document.getElementById('stat-guests').textContent = new Set(allPhotos.map(p => p.uid)).size;
            document.getElementById('stat-retro').textContent = allPhotos.filter(p => p.event === 'retro').length;
            document.getElementById('stat-mehendi').textContent = allPhotos.filter(p => p.event === 'mehendi').length;
            document.getElementById('stat-nikah').textContent = allPhotos.filter(p => p.event === 'nikah').length;
            document.getElementById('photo-count').textContent = allPhotos.length;
        }

        /* ── GUESTS TABLE ──────────────────────────────────────── */
        function renderGuests() {
            const wrap = document.getElementById('guests-wrap');
            document.getElementById('guest-count').textContent = allUsers.length;

            if (allUsers.length === 0) {
                wrap.innerHTML = '<div class="empty">No guests have registered yet.</div>';
                return;
            }

            // Enrich with photo counts
            const enriched = allUsers.map(u => ({
                ...u,
                photoCount: allPhotos.filter(p => p.uid === u.uid).length,
                events: [...new Set(allPhotos.filter(p => p.uid === u.uid).map(p => p.event))],
            })).sort((a, b) => b.photoCount - a.photoCount);

            wrap.innerHTML = `
      <table class="guests-table">
        <thead>
          <tr>
            <th>Guest</th>
            <th>Photos</th>
            <th>Events</th>
            <th>Last Seen</th>
          </tr>
        </thead>
        <tbody>
          ${enriched.map(u => `
            <tr onclick="filterByGuest('${u.uid}')" style="cursor:pointer" title="Filter photos by this guest">
              <td>
                <span class="guest-avatar">${u.avatar || '🌸'}</span>
                <strong>${u.name || 'Unknown'}</strong>
              </td>
              <td>${u.photoCount}</td>
              <td>${u.events.map(e => `<span class="event-chip ${e}">${EVENT_LABELS[e] || e}</span>`).join('') || '—'}</td>
              <td>${u.lastSeen?.toDate ? timeAgo(u.lastSeen.toDate()) : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
        }

        /* ── FILTER BY GUEST (click row) ───────────────────────── */
        let guestFilter = null;

        function filterByGuest(uid) {
            if (guestFilter === uid) {
                guestFilter = null; // toggle off
            } else {
                guestFilter = uid;
            }
            renderPhotos();
            // Scroll down to photo grid
            document.getElementById('photos-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        /* ── EVENT FILTER CHIPS ────────────────────────────────── */
        function filterPhotos(btn) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.event;
            renderPhotos();
        }

        /* ── PHOTOS GRID ───────────────────────────────────────── */
        function renderPhotos() {
            const wrap = document.getElementById('photos-wrap');

            let filtered = allPhotos;
            if (activeFilter !== 'all') filtered = filtered.filter(p => p.event === activeFilter);
            if (guestFilter) filtered = filtered.filter(p => p.uid === guestFilter);

            if (filtered.length === 0) {
                wrap.innerHTML = '<div class="empty">No photos match this filter.</div>';
                return;
            }

            wrap.innerHTML = `<div class="admin-grid">
      ${filtered.map(p => {
                const src = p.url || p.srcUrl || '';
                const time = p.ts ? timeAgo(new Date(p.ts)) : '';
                return `
          <div class="admin-card" onclick="openLb('${src}','${escHtml(p.guestAvatar)} ${escHtml(p.guestName)}','${EVENT_LABELS[p.event] || p.event}')">
            <img src="${src}" alt="${escHtml(p.guestName)}" loading="lazy" />
            <button class="admin-dl-btn" onclick="event.stopPropagation(); dlImg('${src}','${escHtml(p.event)}_${escHtml(p.guestName)}.jpg')" title="Download">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M12 4v12m0 0l-4-4m4 4l4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 18h16" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="admin-card-info">
              <div class="admin-card-guest">${escHtml(p.guestAvatar || '')} ${escHtml(p.guestName || 'Guest')}</div>
              <div class="admin-card-meta">
                <span class="event-chip ${p.event}">${EVENT_LABELS[p.event] || p.event}</span>
                <span class="admin-card-time">${time}</span>
              </div>
            </div>
          </div>`;
            }).join('')}
    </div>`;
        }

        /* ── LIGHTBOX ──────────────────────────────────────────── */
        function openLb(src, guest, event) {
            document.getElementById('lb-img').src = src;
            document.getElementById('lb-guest').textContent = guest;
            document.getElementById('lb-event').textContent = event;
            document.getElementById('lb').classList.add('open');
        }

        function closeLb() {
            document.getElementById('lb').classList.remove('open');
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

        /* ── DOWNLOAD ──────────────────────────────────────────── */
        function dlImg(url, filename) {
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        /* ── HELPERS ───────────────────────────────────────────── */
        function timeAgo(date) {
            const secs = Math.floor((Date.now() - date) / 1000);
            if (secs < 60) return 'just now';
            if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
            if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
            return date.toLocaleDateString();
        }

        function escHtml(str) {
            return String(str || '').replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
    </script>
</body>

</html>
